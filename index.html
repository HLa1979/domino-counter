<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Lam Domino Counter v1.2</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:#0a0a0a; --white:#f5f0e8; --accent:#e8c547;
      --accent-dark:#c9a83a; --muted:#888; --tile-bg:#f5f0e8;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:var(--black);color:var(--white);
      font-family:'DM Sans',sans-serif;
      height:100dvh;display:flex;flex-direction:column;
      overflow:hidden;position:fixed;width:100%;
    }
    header{
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 18px 10px;flex-shrink:0;z-index:10;
    }
    .logo{
      font-family:'Space Mono',monospace;font-size:14px;font-weight:700;
      display:flex;align-items:center;gap:8px;
    }
    .pip-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
    .badge{
      background:rgba(232,197,71,.12);border:0.5px solid rgba(232,197,71,.3);
      border-radius:20px;padding:4px 12px;font-size:11px;
      color:var(--accent);font-family:'Space Mono',monospace;
    }
    .hdr-right{display:flex;gap:8px;align-items:center;}
    .icon-btn{
      width:36px;height:36px;border-radius:50%;
      background:rgba(255,255,255,.07);border:0.5px solid rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:rgba(255,255,255,.6);flex-shrink:0;
    }
    #camera-area{flex:1;position:relative;overflow:hidden;background:#111;}
    #video{width:100%;height:100%;object-fit:cover;display:block;}
    #overlay-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
    #capture-canvas{display:none;}

    .vf-corner{position:absolute;width:26px;height:26px;border-color:var(--accent);border-style:solid;border-width:0;}
    .vf-corner.tl{top:20px;left:20px;border-top-width:3px;border-left-width:3px;border-top-left-radius:4px;}
    .vf-corner.tr{top:20px;right:20px;border-top-width:3px;border-right-width:3px;border-top-right-radius:4px;}
    .vf-corner.bl{bottom:20px;left:20px;border-bottom-width:3px;border-left-width:3px;border-bottom-left-radius:4px;}
    .vf-corner.br{bottom:20px;right:20px;border-bottom-width:3px;border-right-width:3px;border-bottom-right-radius:4px;}

    #hint-text{
      position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
      background:rgba(0,0,0,.55);backdrop-filter:blur(4px);border-radius:20px;
      padding:6px 16px;font-size:13px;color:rgba(255,255,255,.65);
      white-space:nowrap;pointer-events:none;
    }
    #loading-overlay{
      position:absolute;inset:0;background:rgba(0,0,0,.65);
      display:none;align-items:center;justify-content:center;
      flex-direction:column;gap:14px;backdrop-filter:blur(6px);
    }
    #loading-overlay.visible{display:flex;}
    .spinner{
      width:36px;height:36px;border:3px solid rgba(255,255,255,.1);
      border-top-color:var(--accent);border-radius:50%;
      animation:spin .75s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text{font-family:'Space Mono',monospace;font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px;}

    #result-overlay{
      position:absolute;bottom:0;left:0;right:0;padding:16px;
      background:linear-gradient(to top,rgba(0,0,0,.95) 55%,transparent);
      display:none;
    }
    #result-overlay.visible{display:block;}
    .result-card{
      background:rgba(12,12,12,.92);border:1px solid rgba(255,255,255,.1);
      border-radius:20px;padding:18px;backdrop-filter:blur(16px);
    }
    .result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .result-label{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2.5px;color:var(--accent);}
    .dismiss-btn{
      background:rgba(255,255,255,.07);border:none;color:rgba(255,255,255,.4);
      width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:16px;
      display:flex;align-items:center;justify-content:center;
    }
    .domino-vis{display:flex;justify-content:center;margin-bottom:14px;}
    .domino-tile{
      background:var(--tile-bg);border:3px solid #111;border-radius:12px;
      width:110px;height:56px;display:flex;position:relative;
      box-shadow:4px 4px 0 rgba(255,255,255,.06);
    }
    .domino-tile::after{
      content:'';position:absolute;top:4px;bottom:4px;
      left:50%;transform:translateX(-50%);width:2px;background:#111;
    }
    .domino-half{width:50%;height:100%;display:flex;align-items:center;justify-content:center;}
    .pip-grid{display:grid;grid-template-columns:repeat(3,7px);grid-template-rows:repeat(3,7px);gap:2px;}
    .pip-grid.many{grid-template-columns:repeat(var(--pip-cols),4px);grid-template-rows:none;gap:2px;}
    .pip-cell{width:7px;height:7px;}
    .pip-cell.on{border-radius:50%;background:#111;}
    .pip-grid.many .pip-cell{width:4px;height:4px;border-radius:50%;background:#111;}
    .score-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;}
    .score-box{text-align:center;min-width:52px;}
    .score-num{font-family:'Space Mono',monospace;font-size:38px;font-weight:700;line-height:1;}
    .score-num.total{color:var(--accent);font-size:48px;}
    .score-lbl{font-size:11px;color:var(--muted);margin-top:2px;}
    .score-op{font-size:22px;color:rgba(255,255,255,.2);}
    .result-note{
      font-size:12px;color:rgba(255,255,255,.4);text-align:center;
      border-top:0.5px solid rgba(255,255,255,.08);padding-top:10px;font-style:italic;
    }
    .bottom-bar{
      flex-shrink:0;padding:14px 18px 22px;display:flex;
      align-items:center;justify-content:space-between;gap:12px;
      background:var(--black);z-index:10;
    }
    .side-btn{
      width:48px;height:48px;border-radius:50%;
      background:rgba(255,255,255,.07);border:0.5px solid rgba(255,255,255,.12);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:rgba(255,255,255,.6);flex-shrink:0;
    }
    #capture-btn{
      flex:1;max-width:190px;height:62px;border-radius:31px;
      background:var(--accent);border:none;color:var(--black);
      font-family:'Space Mono',monospace;font-size:13px;font-weight:700;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      gap:8px;margin:0 auto;transition:transform .1s,background .15s;
    }
    #capture-btn:active{transform:scale(.96);background:var(--accent-dark);}
    #capture-btn:disabled{opacity:.45;}
    .cap-circle{width:18px;height:18px;border:2.5px solid var(--black);border-radius:50%;}
    #upload-input{display:none;}
    #no-camera-msg{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      gap:12px;height:100%;text-align:center;padding:24px;
    }
    #no-camera-msg svg{opacity:.25;}
    #no-camera-msg p{color:var(--muted);font-size:14px;line-height:1.6;}
    #toast{
      position:absolute;top:16px;left:50%;
      transform:translateX(-50%) translateY(-80px);
      background:#2a2a2a;color:var(--white);padding:10px 18px;
      border-radius:20px;font-size:13px;transition:transform .3s;
      white-space:nowrap;z-index:50;pointer-events:none;
      border:0.5px solid rgba(255,255,255,.12);
    }
    #toast.show{transform:translateX(-50%) translateY(0);}
    #history-modal{
      position:fixed;inset:0;background:rgba(0,0,0,.75);
      z-index:100;display:none;align-items:flex-end;
    }
    #history-modal.open{display:flex;}
    .history-sheet{
      background:#111;border-top-left-radius:24px;border-top-right-radius:24px;
      width:100%;max-height:65dvh;overflow-y:auto;padding:20px 18px 36px;
    }
    .sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:0 auto 20px;}
    .sheet-title{
      font-family:'Space Mono',monospace;font-size:13px;color:var(--accent);
      margin-bottom:14px;display:flex;justify-content:space-between;
    }
    .clear-btn{background:none;border:none;color:rgba(255,255,255,.3);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .history-item{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:0.5px solid rgba(255,255,255,.06);}
    .h-total{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--accent);min-width:44px;}
    .h-detail{flex:1;}
    .h-halves{font-size:17px;font-weight:500;}
    .h-time{font-size:12px;color:var(--muted);margin-top:2px;}
    .history-empty{text-align:center;color:rgba(255,255,255,.25);font-size:14px;padding:36px 0;line-height:1.7;}

    #tips{
      position:absolute;top:0;left:0;right:0;
      background:rgba(10,10,10,.9);padding:14px 18px;
      font-size:13px;color:rgba(255,255,255,.6);line-height:1.7;
      backdrop-filter:blur(8px);display:none;z-index:30;
    }
    #tips strong{color:var(--accent);}
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="pip-dot"></div>Lam Domino Counter v1.2</div>
  <div class="hdr-right">
    <div class="badge"></div>
    <button class="icon-btn" id="tips-btn" title="Tips">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </button>
    <button class="icon-btn" id="history-btn" title="History">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </button>
  </div>
</header>

<div id="camera-area">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay-canvas"></canvas>
